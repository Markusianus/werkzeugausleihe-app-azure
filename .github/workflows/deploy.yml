name: Deploy Backend & Frontend to Azure Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (optional)
        run: npm test
        continue-on-error: true

      - name: Build (optional)
        run: |
          if [ -f package.json ] && npm run | grep -q "build"; then
            npm run build
          fi

      - name: Deploy to Azure Web App (Backend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: toolhub-backend
          package: ./backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}

  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    needs: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build (optional)
        run: |
          if [ -f package.json ] && npm run | grep -q "build"; then
            npm run build
          fi

      - name: Deploy to Azure Web App (Frontend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: toolhub-frontend
          package: ./frontend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}

  cleanup:
    name: Cleanup old workflow runs
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Delete older workflow runs (keep last 3)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 3
          delete_workflow_pattern: Deploy Backend & Frontend to Azure Web Apps
