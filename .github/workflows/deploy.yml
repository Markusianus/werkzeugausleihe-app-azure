name: Deploy Production Apps to Azure Web Apps

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: backend
        run: npm test
        continue-on-error: true

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

  deploy-prod-backend:
    name: Deploy Backend (Produktion)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Azure Web App (Produktion Backend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: toolhub-backend
          package: ./backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}

  deploy-prod-frontend:
    name: Deploy Frontend (Produktion)
    runs-on: ubuntu-latest
    needs: deploy-prod-backend
    if: github.ref == 'refs/heads/master'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Azure Web App (Produktion Frontend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: toolhub-frontend
          package: ./frontend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}

  cleanup:
    name: Cleanup old workflow runs
    runs-on: ubuntu-latest
    needs:
      - deploy-prod-frontend
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Delete older workflow runs (keep last 3)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 3
          delete_workflow_pattern: Deploy Production Apps to Azure Web Apps
